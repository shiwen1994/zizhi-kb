群臣饮酒，乐，而天雨，命駕将適野。左右曰：「今日饮酒乐，天又雨，君将安之？」文侯曰：「吾与虞人期獵，虽乐，豈可无一會期哉！」乃往，身自罷之。韩借師于魏以伐赵。文侯曰：「寡人与赵，兄弟也，不敢闻命。」赵借師于魏以伐韩，文侯应之亦然。二国皆怒而去。已而知文侯以講于己也，皆朝于魏。魏由是始大于三晋，諸侯莫能与之争。使乐羊伐中山，克之，以封其子擊。文侯问于群臣曰：「我何如主？」皆曰：「仁君。」任座曰：「君得中山，不以封君之弟而以封君之子，何謂仁君？」文侯怒，任座趨出。次问翟璜，對曰：「仁君也。」文侯曰：「何以知之？」對曰：「臣闻君仁則臣直。向者任座之言直，臣是以知之。」文侯悅，使翟璜召任座而反之，親下堂迎之，以为上客。文侯与田子方饮，文侯曰：「钟聲不比乎？左高。」田子方笑。文侯曰：「何笑？」子方曰：「臣闻之，君明乐官，不明乐音。今君審于音，臣恐其聾于官也。」文侯曰：「善。」子擊出，遭田子方于道，下车伏謁。子方不为礼。子擊怒，謂子方曰：「富貴者骄人乎？貧賤者骄人乎？」子方曰：「亦貧賤者骄人耳，富貴者安敢骄人？国君而骄人則失其国，大夫而骄人則失其家。失其国者未闻有以国待之者也，失其家者未闻有以家待之者也。夫士貧賤者，言不用，行不合，則纳履而去耳，安往而不得貧賤哉！」子擊乃謝之。文侯謂李克曰：「先生嘗有言曰：『家貧思良妻，国乱思良相。』今所置非成則璜，二子何如？」對曰：「卑不谋尊，疏不谋戚。臣在阙門之外，不敢當命。」文侯曰：「先生臨事勿让。」克曰：「君弗察故也。居視其所親，富視其所与，达視其所舉，穷視其所不为，貧視其所不取，五者足以定之矣，何待克哉！」文侯曰：「先生就捨，吾之相定矣。」李克出，见翟璜。翟璜曰：「今者闻君召先生而卜相，果誰为之？」克曰：「魏成。」翟璜忿然作色曰：「西河守吴起，臣所進也；君内以鄴为憂，臣進西門豹；君欲伐中山，臣進乐羊；中山已拔，无使守之，臣進先生；君之子无傅，臣進屈侯鮒。以耳目之所睹记，臣何負于魏成？」李克曰：「子〔之〕言克于子之君者，豈将比周以求大官哉？君问相于克，克之對如是。所以知君之必相魏成者，魏成食祿千钟，什九在外，什一在内，是以东得卜子夏、田子方、段干木。此三人者，君皆師之；子所進五人者，君皆臣之。子惡得与魏成比也！」翟璜逡巡再拜曰：「璜，鄙人也，失對，愿卒为弟子。」\n吴起者，卫人，仕于鲁。齐人伐鲁，鲁人欲以为将，起取齐女为妻，鲁人疑之，起杀妻以求将，大破齐師。或譖之鲁侯曰：「起始事曾參，母死不奔丧，曾參絕之。今又杀妻以求为君将。起，殘忍薄行人也。且以鲁国区区而有胜敵之名，則諸侯图鲁矣。」起恐得罪。闻魏文侯贤，乃往歸之。文侯问諸李克，李克曰：「起貪而好色，然用兵，司马穰苴弗能过也。」于是文侯以为将，擊秦，拔五城。起之为将，与士卒最下者同衣食，臥不設席，行不骑乘，親裹赢糧，与士卒分勞苦。卒有病疽者，起为吮之。卒母闻而哭之。人曰：「子，卒也，而将軍自吮其疽，何哭为？」母曰：「非然也。往年吴公吮其父(疽)，其父战不還踵，遂死于敵。吴公今又吮其子，妾不知其死所矣，是以哭之。」", "guangzhu": ""}, {"king": "威烈王", "year": "威烈王二十三年（戊寅，西元前四〇三年）", "main_text": "4　燕湣公薨，子僖公立。", "guangzhu": ""}, {"king": "威烈王", "year": "威烈王二十四年（己卯，西元前四〇二年）", "main_text": "", "guangzhu": ""}, {"king": "威烈王", "year": "威烈王二十四年（己卯，西元前四〇二年）", "main_text": "2　盗杀楚聲王，国人立其子〔疑，是为〕悼王。", "guangzhu": ""}, {"king": "安王", "year": "安王元年（庚辰，西元前四〇一年）", "main_text": "1　秦伐魏，至陽〔狐〕(孤)。", "guangzhu": ""}, {"king": "安王", "year": "安王二年（辛巳，西元前四〇〇年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王二年（辛巳，西元前四〇〇年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王二年（辛巳，西元前四〇〇年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王二年（辛巳，西元前四〇〇年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王二年（辛巳，西元 恆〕(常)山在其北，大河经其南，修政不德，武王杀之。由此觀之，在德不在險。若君不修德，舟中之人皆敵国也。」武侯曰：「善。」\n魏置相，相田文。吴起不悅，謂田文曰：「請与子论功，可乎？」田文曰：「可。」起曰：「将三軍，使士卒乐死，敵国不敢谋，子孰与起？」文曰：「不如子。」起曰：「治百官，親萬民，实府庫，子孰与起？」文曰：「不如子。」起曰：「守西河而秦兵不敢东乡，韩、赵賓从，子孰与起？」文曰：「不如子。」起曰：「此三者子皆出吾下，而位加吾上，何也？」文曰：「主少国疑，大臣未附，百姓不信，方是之时，屬之子乎，屬之我乎？」起默然良久，曰：「屬之子矣。」〔文曰：「此乃吾所以居子之上也。」吴起乃自知弗如田文〕。久之，〔田文死〕，(魏相)公叔〔为相〕，尚〔魏公〕主而害吴起。公叔之仆曰：「起易去也。起为人剛勁自喜，子先言于君曰：『吴起，贤人也，而君之国小，臣恐起之无留心也，君盍試延以女？起无留心，則必辞矣。』子因与起歸而使公主辱子，起见公主之賤子也，必辞，則子之计中矣。」公叔从之，吴起果辞公主。魏武侯疑之而未信，起惧诛，遂奔楚。楚悼王素闻其贤，至則任之为相。起明法審令，捐不急之官，废公族疏远者，以撫養战鬬之士，要在强兵，破游说之言从橫者。于是南平百越，北卻三晋，西伐秦，諸侯皆患楚之强，而楚之貴戚大臣多怨吴起者。", "guangzhu": ""}, {"king": "安王", "year": "安王十五年（甲午，西元前三八七年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王十五年（甲午，西元前三八七年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王十五年（甲午，西元前三八七年）", "main_text": "5　韩烈侯薨，子文侯立。", "guangzhu": ""}, {"king": "安王", "year": "安王十六年（乙未，西元前三八六年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王十六年（乙未，西元前三八六年）", "main_text": "2　赵公子朝作乱，出奔魏，与魏襲邯鄲，不克。", "guangzhu": ""}, {"king": "安王", "year": "安王十七年（丙申，西元前三八五年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王十七年（丙申，西元前三八五年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王十七年（丙申，西元前三八五年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王十七年（丙申，西元前三八五年）", "main_text": "4　齐太公薨，子桓公午立。", "guangzhu": ""}, {"king": "安王", "year": "安王十九年（戊戌，西元前三八三年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王十九年（戊戌，西元前三八三年）", "main_text": "2　〔鲁穆公薨，子共公奮立〕。", "guangzhu": ""}, {"king": "安王", "year": "安王二十年（己亥，西元前三八二年）", "main_text": "1　日有食之，既。", "guangzhu": ""}, {"king": "安王", "year": "安王二十一年（庚子，西元前三八一年）", "main_text": "1　楚悼王薨，貴戚大臣作乱，攻吴起，起走之王尸而伏之。擊起之徒因射刺起，并中王尸。既葬，〔太子〕肅王〔臧〕即位。使令尹盡诛为乱者，坐起夷宗者七十余家。", "guangzhu": ""}, {"king": "安王", "year": "安王二十二年（辛丑，西元前三八〇年）", "main_text": "1　齐伐燕，取桑丘。魏、韩、赵伐齐，至桑丘。", "guangzhu": ""}, {"king": "安王", "year": "安王二十三年（壬寅，西元前三七九年）", "main_text": "", "guangzhu": ""}, {"king": "安王", "year": "安王二十三年（壬寅，西元前三七九年）", "main_text": "2　齐康公薨，无子，田氏遂并齐而有之。", "g ": "烈王七年（壬子，西元前三六九年）", "main_text": "", "guangzhu": ""}, {"king": "烈王", "year": "烈王七年（壬子，西元前三六九年）", "main_text": "3　魏大夫王錯出奔韩。公孙頎謂韩懿侯曰：「魏乱，可取也。」懿侯乃与赵成侯合兵伐魏，战于浊泽，大破之，遂围魏。成侯曰：「杀罃，立公中缓，割地而退，我二国之利也。」懿侯曰：「不可。杀魏君，暴也；割地而退，貪也。不如兩分之。魏分为兩，不强于宋、卫，則我終无魏患矣。」赵人不听。懿侯不悅，以其兵夜去。赵成侯亦去。罃遂杀公中缓而立，是为惠王。", "guangzhu": "::太史公曰：魏惠王之所以身不死，国不分者，二国之谋不和也。若从一家之谋，魏必分矣。故曰：「君終，无適子，其国可破也。」"}];

  {id:'bai',   label:'🗣️ 白话'},
  {id:'xun',   label:'🔤 训诂'},
  {id:'bg',    label:'🏛️ 背景'},
  {id:'husan', label:'📝 胡注'},
  {id:'sima',  label:'💬 司马光'},
  {id:'xitong',label:'🏗️ 系统'},
  {id:'yingshe',label:'🪞 映射'},
  {id:'siduan',label:'🤔 思辨'},
];

// 渲染条目
function renderEntry(entry, index) {
  const hasGuangzhu = entry.guangu || entry.guangzhu;
  const isKey = index < 10; // 简化：前10条为重点
  const filter = window.currentFilter || 'all';
  if (filter === 'key' && !isKey) return '';
  if (filter === 'guangzhu' && !hasGuangzhu) return '';

  const guangText = entry.guangu || entry.guangzhu || '';

  const layerTabs = LAYERS.map((l, i) =>
    `<button class="ltab${i===0?' active':''}" data-layer="${l.id}">${l.label}</button>`
  ).join('');

  // 每层的 HTML
  const origHTML = `<div class="layer-content active" data-layer="orig">
    <div class="orig-text">${entry.main_text || entry.raw || '(无原文)'}</div>
  </div>`;

  const baiHTML = `<div class="layer-content" data-layer="bai">
    <div class="layer-label">🗣️ 白话</div>
    <div class="bai-text">${entry.bai_hua || '(白话待生成)'}</div>
  </div>`;

  const xunHTML = `<div class="layer-content" data-layer="xun">
    <div class="layer-label">🔤 训诂</div>
    <div class="xun-gu">${entry.xun_gu || '(训诂待生成)'}</div>
  </div>`;

  const bgHTML = `<div class="layer-content" data-layer="bg">
    <div class="layer-label">🏛️ 背景脉络</div>
    <div class="bg-timeline">${entry.beijing || '(背景待生成)'}</div>
  </div>`;

  const husanHTML = `<div class="layer-content" data-layer="husan">
    <div class="layer-label">📝 胡三省注</div>
    <div class="husan">
      <blockquote>${guangText || '(无臣光曰)'}</blockquote>
    </div>
  </div>`;

  const simaHTML = `<div class="layer-content" data-layer="sima">
    <div class="layer-label">💬 司马光评论</div>
    <div class="sima-block">${entry.sima_ping || '(评论待生成)'}</div>
  </div>`;

  const xitongHTML = `<div class="layer-content" data-layer="xitong">
    <div class="layer-label">🏗️ 系统解构</div>
    <div class="xitong-block">${entry.xitong || '(系统解构待生成)'}</div>
  </div>`;

  const yingsheHTML = `<div class="layer-content" data-layer="yingshe">
    <div class="layer-label">🪞 现代映射</div>
    <div class="yingshe-block">${entry.yingshe || '(现代映射待生成)'}</div>
  </div>`;

  const siduanHTML = `<div class="layer-content" data-layer="siduan">
    <div class="layer-label">🤔 思辨训练</div>
    <div class="siduan-block">${entry.siduan || '(思辨问题待生成)'}</div>
  </div>`;

  return `
  <div class="entry" id="entry-${index}" data-index="${index}" data-key="${isKey}" data-hasguang="${!!hasGuangzhu}">
    <div class="entry-header" onclick="toggleEntry(${index})">
      <div class="entry-year">${entry.year || ''}</div>
      <div class="entry-title">${(entry.main_text||entry.raw||'').substring(0,40)}...</div>
    </div>
    <div class="entry-body" id="body-${index}" style="display:none">
      <div class="layer-tabs">${layerTabs}</div>
      ${origHTML}${baiHTML}${xunHTML}${bgHTML}${husanHTML}${simaHTML}${xitongHTML}${yingsheHTML}${siduanHTML}
    </div>
  </div>`;
}

function toggleEntry(idx) {
  const body = document.getElementById('body-' + idx);
  const allBodies = document.querySelectorAll('.entry-body');
  allBodies.forEach(b => b.style.display = 'none');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    body.scrollIntoView({behavior:'smooth',block:'start'});
  } else {
    body.style.display = 'none';
  }
}

// 层级 tab 切换（事件代理）
document.addEventListener('click', function(e){
  if (e.target.classList.contains('ltab')) {
    const panel = e.target.closest('.entry-body');
    const layerId = e.target.dataset.layer;
    panel.querySelectorAll('.ltab').forEach(t => t.classList.remove('active'));
    panel.querySelectorAll('.layer-content').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    panel.querySelector(`.layer-content[data-layer="${layerId}"]`).classList.add('active');
  }
});

// 筛选
window.currentFilter = 'all';
document.getElementById('filterBar').addEventListener('click', function(e){
  if (e.target.classList.contains('fbtn')) {
    window.currentFilter = e.target.dataset.filter;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderAll();
  }
});

function renderAll() {
  const container = document.getElementById('entryList');
  const html = ENTRIES.map((e,i) => renderEntry(e,i)).join('');
  container.innerHTML = html || '<div class="empty">暂无符合条件的事件</div>';
}

// 初始化
renderAll();
</script>
</body>
</html>
